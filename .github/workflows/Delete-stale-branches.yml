name: Delete stale branches (GraphQL refs)

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Delete branches whose last commit is older than this many days"
        required: true
        default: "180"
      dry_run:
        description: "If true, only prints branches that would be deleted"
        required: true
        default: "false"
      page_size:
        description: "How many branch refs to fetch per GraphQL page (max 100)"
        required: true
        default: "100"
      max_candidates:
        description: "Max stale candidates to merge-check+delete per run (rate-limit safety)"
        required: true
        default: "100"
      max_pages:
        description: "Max GraphQL pages to fetch per run (e.g. 50 pages x 100 = 5000 branches scanned)"
        required: true
        default: "50"
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: delete-stale-branches
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on:
      group: 'Concordia-WestUS3'
      labels: 'concordia-linux-cpu2-ram7gi'
    timeout-minutes: 55

    steps:
      - name: Cleanup stale branches
        uses: actions/github-script@v7
        env:
          DAYS: ${{ inputs.days || '180' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          PAGE_SIZE: ${{ inputs.page_size || '100' }}
          MAX_CANDIDATES: ${{ inputs.max_candidates || '100' }}
          MAX_PAGES: ${{ inputs.max_pages || '50' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const days = parseInt(process.env.DAYS, 10);
            const dryRun = (process.env.DRY_RUN || 'false').toLowerCase() === 'true';
            const pageSize = Math.min(Math.max(parseInt(process.env.PAGE_SIZE, 10), 1), 100);
            const maxCandidates = Math.max(parseInt(process.env.MAX_CANDIDATES, 10), 1);
            const maxPages = Math.max(parseInt(process.env.MAX_PAGES, 10), 1);

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000);

            // Exclusions — "never delete" rules, even if stale
            const excludeExact = new Set([
              'develop', 'development',
              'staging', 'stage',
              'prod', 'production',
            ]);
            const excludePrefixes = [
              'release/',
              'hotfix/',
            ];
            function isExcluded(name) {
              if (excludeExact.has(name)) return true;
              if (excludePrefixes.some(p => name.startsWith(p))) return true;
              return false;
            }

            core.info(`Repo: ${owner}/${repo}`);
            core.info(`Cutoff: ${cutoff.toISOString()} (>${days} days old)`);
            core.info(`Dry run: ${dryRun}`);
            core.info(`Page size: ${pageSize} (GraphQL max: 100)`);
            core.info(`Max candidates: ${maxCandidates}`);
            core.info(`Max pages: ${maxPages}`);

            // Get default branch
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            core.info(`Default branch: ${defaultBranch}`);

            core.info('All stale branches (merged or not) will be deleted.');

            // GraphQL query
            const query = `
              query($owner: String!, $repo: String!, $n: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  refs(refPrefix: "refs/heads/", first: $n, after: $cursor, orderBy: {field: ALPHABETICAL, direction: ASC}) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      name
                      target {
                        __typename
                        ... on Commit { committedDate oid }
                      }
                    }
                  }
                }
              }
            `;

            // Paginate through ALL branches (up to maxPages)
            const candidates = [];
            let totalFetched = 0;
            let cursor = null;
            let pagesScanned = 0;

            for (let page = 0; page < maxPages; page++) {
              const data = await github.graphql(query, { owner, repo, n: pageSize, cursor });
              const refs = data.repository.refs.nodes || [];
              const pageInfo = data.repository.refs.pageInfo;

              totalFetched += refs.length;
              pagesScanned++;

              core.info(`Page ${page + 1}: fetched ${refs.length} branches (total: ${totalFetched}). hasNext=${pageInfo.hasNextPage}`);

              for (const r of refs) {
                const name = r.name;

                if (name === defaultBranch) continue;
                if (name === 'main' || name === 'master') continue;
                if (isExcluded(name)) continue;
                if (!r.target || r.target.__typename !== 'Commit') continue;

                const committedDate = new Date(r.target.committedDate);
                if (committedDate < cutoff) {
                  candidates.push({ name, committedDate, oid: r.target.oid });
                  if (candidates.length >= maxCandidates) break;
                }
              }

              cursor = pageInfo.endCursor;

              if (!pageInfo.hasNextPage || candidates.length >= maxCandidates) break;
            }

            core.info(`Scanned ${pagesScanned} page(s), ${totalFetched} branches total.`);
            core.info(`Stale candidates (capped at ${maxCandidates}): ${candidates.length}`);

            let skippedProtected = 0;
            let skippedError = 0;
            let wouldDelete = 0;
            let deleted = 0;

            for (const c of candidates) {
              wouldDelete++;

              if (dryRun) {
                core.info(`[DRY RUN] Would delete: ${c.name} lastCommit=${c.committedDate.toISOString()}`);
              } else {
                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${c.name}`,
                  });
                  core.info(`Deleted: ${c.name} lastCommit=${c.committedDate.toISOString()}`);
                  deleted++;
                } catch (e) {
                  if (e.status === 422 && e.message && e.message.includes('Repository rule violations')) {
                    skippedProtected++;
                    core.warning(`SKIP protected (ruleset): ${c.name} — branch is protected by repository rules`);
                  } else if (e.status === 404) {
                    core.warning(`SKIP not found: ${c.name} — branch may have been deleted already`);
                  } else {
                    skippedError++;
                    core.warning(`SKIP error: ${c.name} — ${e.status} ${e.message}`);
                  }
                }
              }
            }

            core.info('');
            core.info('=== SUMMARY ===');
            core.info(`Branches scanned:       ${totalFetched}`);
            core.info(`Stale candidates:       ${candidates.length}`);
            core.info(`Skipped (ruleset):      ${skippedProtected}`);
            core.info(`Skipped (errors):       ${skippedError}`);
            core.info(`Would delete:           ${wouldDelete}`);
            core.info(`Actually deleted:       ${deleted}`);

            if (skippedProtected > 0) {
              core.warning(`${skippedProtected} branch(es) could not be deleted due to repository rulesets. An org admin may need to update the ruleset if these branches should be deletable.`);
            }
